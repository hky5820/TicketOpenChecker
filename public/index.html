<!doctype html>
<html lang="ko" style="color-scheme:dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>티켓 오픈</title>
  <meta name="theme-color" content="#121212">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="NOL·멜론·티켓링크 티켓 오픈 일정을 한눈에">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="티켓오픈">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>html,body{background:#121212}</style>
  <link rel="stylesheet" href="home.css?v=20260714e">
</head>
<body>
  <div class="wrap">
    <header class="hd">
      <h1>티켓오픈</h1>
      <span class="mon" id="monLabel"></span>
      <button class="ic" id="searchBtn" type="button" aria-label="검색">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </button>
    </header>

    <div class="days" id="days"></div>
    <div class="vtabs" id="vtabs"></div>

    <section class="view" id="view-home">
      <div class="feed" id="feed"></div>
    </section>

    <section class="view" id="view-cal" hidden>
      <div class="calhd">
        <button class="nav" id="calPrev" type="button" aria-label="이전 달"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <b id="calLabel"></b>
        <button class="nav" id="calNext" type="button" aria-label="다음 달"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        <button class="tdy" id="calToday" type="button">오늘</button>
      </div>
      <div class="calwk"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="calbody"><div class="calgrid" id="calGrid"></div><div class="cdet" id="calDetail"></div></div>
    </section>

    <section class="view" id="view-alarm" hidden>
      <div class="pagebody" id="alarmBody"></div>
    </section>

    <section class="view" id="view-my" hidden>
      <div class="pagebody">
        <div class="mysec">
          <h3>데이터</h3>
          <div class="mycard">
            <div class="myrow"><span class="rlab">마지막 수집</span><span class="rval" id="genAt">-</span></div>
            <div class="myrow"><span class="rlab">전체 일정</span><span class="rval" id="totCnt">-</span></div>
            <div class="myrow" id="rowReload"><span class="rlab">새로 수집하기</span><button class="rbtn" id="reloadBtn" type="button">새로고침</button></div>
          </div>
        </div>
        <div class="mysec" id="secStatus">
          <h3>수집 현황</h3>
          <div class="mycard">
            <div class="myrow strow"><span class="rlab">NOL 티켓</span><span class="rval" id="st-interpark">-</span></div>
            <div class="myrow strow"><span class="rlab">멜론 티켓</span><span class="rval" id="st-melon">-</span></div>
            <div class="myrow strow"><span class="rlab">티켓링크</span><span class="rval" id="st-ticketlink">-</span></div>
          </div>
        </div>
        <div class="mysec">
          <h3>관리</h3>
          <div class="mycard">
            <div class="myrow"><span class="rlab">저장된 데이터 초기화</span><button class="rbtn ghost" id="clearBtn" type="button">초기화</button></div>
          </div>
        </div>
      </div>
    </section>

    <nav class="dock">
      <button id="tab-home" type="button" class="on"><svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="m3 10 9-7 9 7v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>홈</button>
      <button id="tab-cal" type="button"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>캘린더</button>
      <button id="tab-alarm" type="button"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>알림</button>
      <button id="tab-my" type="button"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>마이</button>
    </nav>

    <div class="ov" id="ov">
      <button class="x" id="ovX" type="button" aria-label="닫기"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div class="ohd" id="ovHd"></div>
      <div class="obody"><div class="grid" id="ovGrid"></div></div>
    </div>

    <div class="sov" id="sov">
      <div class="spanel">
        <div class="shead">
          <input id="sInput" type="search" autocomplete="off" placeholder="공연명 검색">
          <button class="x" id="sovX" type="button" aria-label="닫기"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="sbody" id="sRes"></div>
      </div>
    </div>
  </div>

  <script src="home.js?v=20260714e"></script>
</body>
</html>
