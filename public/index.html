<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>티켓 오픈 캘린더</title>
  <meta id="metaTheme" name="theme-color" content="#eef2fb">
  <meta name="color-scheme" content="light">
  <meta name="description" content="NOL·멜론·티켓링크 티켓 오픈 일정을 한눈에">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="티켓오픈">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>html,body{background:#eef2fb}</style>
  <script>
    // 앱 자체 라이트/다크 토글. 시스템 다크는 따라가지 않고 기본은 라이트.
    (function () {
      try {
        var dark = localStorage.getItem('toc_theme') === 'dark';
        var root = document.documentElement;
        root.setAttribute('data-theme', dark ? 'dark' : 'light');
        root.style.colorScheme = dark ? 'dark' : 'light';
        var m = document.getElementById('metaTheme');
        if (m) m.content = dark ? '#0b0e15' : '#eef2fb';
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css?v=20260712f">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="toolbar">
        <div class="view-switch" role="group" aria-label="보기 모드">
          <button id="calendarView" class="view-button is-selected" type="button" title="캘린더 보기" aria-label="캘린더 보기" aria-pressed="true">
            <span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>
          </button>
          <button id="siteView" class="view-button" type="button" title="리스트 보기" aria-label="리스트 보기" aria-pressed="false">
            <span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></span>
          </button>
        </div>
        <div class="toolbar-right">
          <button id="today" class="chip-button" type="button">오늘</button>
          <button id="themeToggle" class="icon-button" type="button" title="다크/라이트 전환" aria-label="다크/라이트 전환">
            <span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></span>
          </button>
          <button id="load" class="icon-button load-button" type="button" title="불러오기" aria-label="불러오기">
            <span class="button-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></span>
          </button>
        </div>
      </div>
      <div class="search-box">
        <input id="searchInput" type="search" autocomplete="off" placeholder="공연명으로 날짜 찾기">
        <div id="searchSuggestions" class="search-suggestions" hidden></div>
      </div>
    </header>

    <section class="workspace">
      <aside class="status-strip" aria-live="polite">
        <div class="status-head">
          <strong>수집 현황</strong>
          <span>실시간</span>
        </div>
        <div class="status-item" data-site="interpark"><strong>NOL 티켓</strong><span>대기 중</span></div>
        <div class="status-item" data-site="melon"><strong>멜론 티켓</strong><span>대기 중</span></div>
        <div class="status-item" data-site="ticketlink"><strong>티켓링크</strong><span>대기 중</span></div>
      </aside>

      <section class="calendar-panel">
        <nav class="month-nav" aria-label="월 이동">
          <button id="prevMonth" class="nav-arrow" type="button" title="이전 달" aria-label="이전 달"><span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></span></button>
          <h2 id="monthLabel"></h2>
          <button id="nextMonth" class="nav-arrow" type="button" title="다음 달" aria-label="다음 달"><span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></span></button>
        </nav>
        <p id="summary" class="summary-line">불러오기를 누르면 최신 일정이 표시됩니다.</p>
        <div id="weekdayGrid" class="weekday-grid" aria-hidden="true">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-viewport">
          <div id="calendar" class="calendar-grid"></div>
        </div>
        <div id="groupSwitch" class="group-switch" role="group" aria-label="정렬/그룹 기준" hidden>
          <button id="groupDate" class="group-button is-selected" type="button" data-group="date" aria-pressed="true">날짜순</button>
          <button id="groupViews" class="group-button" type="button" data-group="views" aria-pressed="false">조회순</button>
          <button id="groupSite" class="group-button" type="button" data-group="site" aria-pressed="false">예매처별</button>
        </div>
        <div id="siteBoard" class="site-board" hidden></div>
      </section>

      <aside class="side-panel">
        <div class="panel-head">
          <h2>시간 미정</h2>
          <span id="unknownCount">0건</span>
        </div>
        <div id="unknownList" class="unknown-list">
          <p class="empty">시간이 정해지지 않은 공연이 여기에 표시됩니다.</p>
        </div>
      </aside>
    </section>
  </main>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
<!-- awesome-design-tools: Feather "x" 아이콘 --><button class="icon-button" type="button" data-close title="닫기" aria-label="닫기"><span aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></span></button>
      </div>
      <div id="modalList" class="modal-list"></div>
    </section>
  </div>

  <div id="confirmModal" class="modal" hidden>
    <div class="modal-backdrop" data-confirm-close></div>
    <section class="confirm-card" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmText">
      <h2 id="confirmTitle">예매정보창으로 이동</h2>
      <p id="confirmText">예매정보창으로 이동하시겠습니까?</p>
      <p id="confirmSub" class="confirm-sub"></p>
      <div class="confirm-actions">
        <button id="confirmCancel" class="text-button" type="button" data-confirm-close>취소</button>
        <button id="confirmGo" class="primary-button" type="button">이동</button>
      </div>
    </section>
  </div>

  <script src="app.js?v=20260712f"></script>
</body>
</html>
